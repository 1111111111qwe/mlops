name: MLOps End-to-End Pipeline

# ── SECTION 1: TRIGGERS ──────────────────────────
on:
  push:
    branches: [dev]
    paths:
      - 'src/**'
      - 'train.py'
  pull_request:
    branches: [main]

# ── SECTION 2: JOBS ──────────────────────────────
jobs:

  # ── JOB 1: CI — Validate ─────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:

      # Step 1 — always first: download your code
      - name: Checkout Code
        uses: actions/checkout@v4
